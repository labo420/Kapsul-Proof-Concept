kind = "mobile"
previewPath = "/"
title = "Kapsul"
version = "1.0.0"
id = "artifacts/kapsul"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 22143

[services.development]
run = "pnpm --filter @workspace/kapsul run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/kapsul", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/kapsul", "run", "serve" ]

[services.env]
PORT = "22143"
BASE_PATH = "/"
